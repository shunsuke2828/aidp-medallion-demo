name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html README.md _site/
          cp aidp_medallion_demo_cells.ipynb _site/
          cp aidp_medallion_demo_cells.md _site/
          cp AIDP_Medallion_Demo_Runbook.md _site/
          cp AIDP_Medallion_Demo_Runbook.docx _site/
          cp aidp_medallion_demo_queries_and_cleanup.sql _site/
          cp aidp_medallion_data_transformation.svg _site/
          cp aidp_medallion_data_transformation_preview.png _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
